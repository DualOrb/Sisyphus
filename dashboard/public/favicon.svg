<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0a0a1a"/>
  <!-- Boulder - the rock Sisyphus pushes -->
  <circle cx="20" cy="10" r="6" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>
  <circle cx="20" cy="10" r="3" fill="#06b6d4" opacity="0.3"/>
  <!-- Slope line -->
  <line x1="4" y1="28" x2="26" y2="6" stroke="#06b6d4" stroke-width="1" opacity="0.25"/>
  <!-- Figure pushing -->
  <circle cx="14" cy="16" r="2" fill="#06b6d4" opacity="0.7"/>
  <line x1="14" y1="18" x2="14" y2="24" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
  <line x1="14" y1="24" x2="11" y2="28" stroke="#06b6d4" stroke-width="1.2" opacity="0.7"/>
  <line x1="14" y1="24" x2="17" y2="28" stroke="#06b6d4" stroke-width="1.2" opacity="0.7"/>
  <line x1="14" y1="20" x2="18" y2="14" stroke="#06b6d4" stroke-width="1.2" opacity="0.7"/>
  <!-- Holographic glow ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.2"/>
</svg>
